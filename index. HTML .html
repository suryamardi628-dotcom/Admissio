<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS PVT LTD | Register / Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at 10% 30%, #1a1a2e, #16213e, #0f0c29);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated VFX elements */
        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.6;
            animation: float 14s infinite alternate ease-in-out;
            z-index: 0;
        }
        .orb1 { width: 400px; height: 400px; background: #ff4d6d; top: -150px; left: -150px; }
        .orb2 { width: 500px; height: 500px; background: #3b28cc; bottom: -200px; right: -150px; animation-duration: 18s; }
        .orb3 { width: 300px; height: 300px; background: #f9c74f; top: 40%; left: 70%; animation-duration: 12s; filter: blur(60px); }
        .orb4 { width: 250px; height: 250px; background: #00bbf9; bottom: 20%; left: 10%; animation-duration: 20s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(40px, 60px) scale(1.3); }
        }

        /* Main glass card */
        .glass-card {
            background: rgba(15, 25, 45, 0.6);
            backdrop-filter: blur(16px);
            border-radius: 2rem;
            padding: 2rem 2rem 2.5rem;
            width: 460px;
            max-width: 90%;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.08);
            z-index: 2;
            transition: transform 0.25s ease;
        }
        .glass-card:hover { transform: translateY(-5px); }

        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFF, #FFD966, #FF6B6B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.25rem;
        }
        .tagline {
            text-align: center;
            color: #b9c7d9;
            font-size: 0.85rem;
            margin-bottom: 1.8rem;
            letter-spacing: 1px;
        }

        .form-container {
            transition: all 0.3s;
        }
        .form-group {
            margin-bottom: 1.3rem;
        }
        input {
            width: 100%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 12px 18px;
            border-radius: 40px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s;
        }
        input:focus {
            border-color: #ffd966;
            background: rgba(255,255,255,0.18);
            box-shadow: 0 0 12px rgba(255,217,102,0.3);
        }
        input::placeholder { color: #b0c4de; }

        button {
            width: 100%;
            background: linear-gradient(95deg, #ff8c42, #ff2e63);
            border: none;
            padding: 12px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 1.05rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            box-shadow: 0 6px 14px rgba(0,0,0,0.2);
        }
        button:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .toggle-link {
            text-align: center;
            margin-top: 1.8rem;
            color: #ddd;
            font-size: 0.9rem;
        }
        .toggle-link span {
            color: #ffd966;
            cursor: pointer;
            font-weight: 600;
            text-decoration: underline;
        }
        .error-msg {
            color: #ffb347;
            font-size: 0.75rem;
            margin-top: 6px;
            padding-left: 15px;
        }

        /* Toast notification */
        .toast {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: #2ecc71;
            color: #fff;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 500;
            z-index: 100;
            animation: slideIn 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .toast.error { background: #e74c3c; }
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <div class="orb orb4"></div>

    <div class="glass-card">
        <div class="logo">📱 SMS PVT LTD</div>
        <div class="tagline">Secure • Fast • Reliable</div>

        <!-- Register Form -->
        <div id="registerForm" class="form-container">
            <div class="form-group">
                <input type="text" id="regUsername" placeholder="Full Name" autocomplete="off">
            </div>
            <div class="form-group">
                <input type="email" id="regEmail" placeholder="Email address">
            </div>
            <div class="form-group">
                <input type="password" id="regPassword" placeholder="Password (min 6 chars)">
            </div>
            <button id="registerBtn">🚀 CREATE ACCOUNT</button>
            <div class="toggle-link">Already have an account? <span id="gotoLogin">Login →</span></div>
            <div id="regError" class="error-msg"></div>
        </div>

        <!-- Login Form (initially hidden) -->
        <div id="loginForm" class="form-container hidden">
            <div class="form-group">
                <input type="email" id="loginEmail" placeholder="Email address">
            </div>
            <div class="form-group">
                <input type="password" id="loginPassword" placeholder="Password">
            </div>
            <button id="loginBtn">🔐 SIGN IN</button>
            <div class="toggle-link">New user? <span id="gotoRegister">Create account →</span></div>
            <div id="loginError" class="error-msg"></div>
        </div>
    </div>

    <script>
        // Toggle between forms
        const registerDiv = document.getElementById('registerForm');
        const loginDiv = document.getElementById('loginForm');
        document.getElementById('gotoLogin').onclick = () => { registerDiv.classList.add('hidden'); loginDiv.classList.remove('hidden'); };
        document.getElementById('gotoRegister').onclick = () => { loginDiv.classList.add('hidden'); registerDiv.classList.remove('hidden'); };

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = `toast ${isError ? 'error' : ''}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Register
        document.getElementById('registerBtn').onclick = async () => {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const errDiv = document.getElementById('regError');
            if (!username || !email || !password) {
                errDiv.innerText = 'All fields required';
                return;
            }
            if (password.length < 6) {
                errDiv.innerText = 'Password must be at least 6 characters';
                return;
            }
            errDiv.innerText = '';
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('✅ Registration successful! Please login.');
                    document.getElementById('gotoLogin').click();
                    document.getElementById('regUsername').value = '';
                    document.getElementById('regEmail').value = '';
                    document.getElementById('regPassword').value = '';
                } else {
                    errDiv.innerText = data.error || 'Registration failed';
                }
            } catch (err) {
                errDiv.innerText = 'Server error. Try again.';
            }
        };

        // Login
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const errDiv = document.getElementById('loginError');
            if (!email || !password) {
                errDiv.innerText = 'Email and password required';
                return;
            }
            errDiv.innerText = '';
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (res.ok) {
                    showToast('🎉 Login successful! Redirecting...');
                    window.location.href = '/dashboard.html';
                } else {
                    errDiv.innerText = data.error || 'Invalid credentials';
                }
            } catch (err) {
                errDiv.innerText = 'Server error.';
            }
        };
    </script>
</body>
</html>
